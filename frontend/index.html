<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Answer Evaluator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Lato:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="static/css/style.css" />
</head>
<body>

  <header>
    <div class="logo-icon">
      <svg viewBox="0 0 20 20" fill="white"><path d="M10 2L2 6v8l8 4 8-4V6L10 2zm0 2.2l5.5 2.75-5.5 2.75L4.5 6.95 10 4.2zM3.5 8.3l5.75 2.88v5.5L3.5 13.8V8.3zm7.25 8.38v-5.5L16.5 8.3v5.5l-5.75 2.88z"/></svg>
    </div>
    <h1>Mini Answer Evaluator</h1>
    <span class="badge">Evalvia Project</span>
  </header>

  <div class="layout">

    <!-- LEFT: Input Panel -->
    <div class="panel">
      <div class="panel-header">
        <div class="num">1</div>
        <h2>Question &amp; Answer</h2>
      </div>
      <div class="panel-body">

        <div class="field">
          <label for="subjectSelect">Subject</label>
          <select id="subjectSelect">
            <option value="auto">Auto-detect from question</option>
            <option value="physics">Physics (Class 12)</option>
            <option value="mathematics">Mathematics (Class 12)</option>
            <option value="chemistry">Chemistry (Class 12)</option>
            <option value="english">English (Class 10)</option>
            <option value="biology">Biology (Class 12)</option>
            <option value="history">History (Class 10)</option>
          </select>
        </div>

        <div class="field">
          <label for="questionInput">Question</label>
          <textarea id="questionInput" rows="3" placeholder="e.g. State Newton's second law of motion and give its formula."></textarea>
        </div>

        <div class="field">
          <label for="answerInput">Student Answer</label>
          <textarea id="answerInput" rows="5" placeholder="Enter the student's answer here..."></textarea>
        </div>

        <div id="rubricPreview"></div>

        <button class="btn" id="evalBtn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="white"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zM6 5.5l4 2.5-4 2.5V5.5z"/></svg>
          Evaluate Answer
        </button>

        <button class="btn btn-sec" id="compareBtn">
          Compare: With vs Without Rubric
        </button>

      </div>
    </div>

    <!-- RIGHT: Result Panel -->
    <div class="panel">
      <div class="panel-header">
        <div class="num">2</div>
        <h2>Evaluation Result</h2>
      </div>
      <div class="panel-body" id="resultArea">
        <div class="empty-state">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="6" width="32" height="36" rx="3" stroke="currentColor" stroke-width="2"/>
            <line x1="14" y1="16" x2="34" y2="16" stroke="currentColor" stroke-width="2"/>
            <line x1="14" y1="22" x2="34" y2="22" stroke="currentColor" stroke-width="2"/>
            <line x1="14" y1="28" x2="24" y2="28" stroke="currentColor" stroke-width="2"/>
          </svg>
          <p>Enter a question and student answer,<br>then click <strong>Evaluate Answer</strong>.</p>
        </div>
      </div>
    </div>

  </div>

  <script src="static/js/app.js"></script>
</body>
</html>
